name: Gitgent Agent Dispatch

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Task file name (without .yaml extension) from tasks/"
        required: false
        default: ""
      prompt:
        description: "Direct prompt to the agent (overrides task file)"
        required: false
        default: ""

jobs:
  agent-run:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Check agent is enabled
        env:
          HAS_OPENROUTER: ${{ secrets.OPENROUTER_API_KEY != '' }}
          HAS_OPENAI: ${{ secrets.OPENAI_API_KEY != '' }}
          HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          HAS_GEMINI: ${{ secrets.GEMINI_API_KEY != '' }}
          HAS_GROQ: ${{ secrets.GROQ_API_KEY != '' }}
          HAS_XAI: ${{ secrets.XAI_API_KEY != '' }}
          HAS_MISTRAL: ${{ secrets.MISTRAL_API_KEY != '' }}
        run: |
          if [ "$HAS_OPENROUTER" = "true" ] || [ "$HAS_OPENAI" = "true" ] || \
             [ "$HAS_ANTHROPIC" = "true" ] || [ "$HAS_GEMINI" = "true" ] || \
             [ "$HAS_GROQ" = "true" ] || [ "$HAS_XAI" = "true" ] || \
             [ "$HAS_MISTRAL" = "true" ]; then
            echo "✅ LLM API key detected."
          else
            echo "❌ No LLM API key secret configured."
            echo "   Set OPENROUTER_API_KEY (or another provider key) in Settings → Secrets → Actions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run postinstall
        run: npm rebuild

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run agent (task file)
        if: inputs.task != '' && inputs.prompt == ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITGENT_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGENT_PROVIDER: ${{ vars.GITGENT_PROVIDER }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITGENT_MODEL: ${{ vars.GITGENT_MODEL }}
          GITGENT_REPO_ROOT: ${{ github.workspace }}
        run: |
          TASK_FILE="tasks/${{ inputs.task }}.yaml"
          if [ ! -f "$TASK_FILE" ]; then
            echo "❌ Task file not found: $TASK_FILE"
            exit 1
          fi
          npx tsx src/main.ts "$TASK_FILE"

      - name: Run agent (direct prompt)
        if: inputs.prompt != ''
        env:
          GITGENT_PROMPT: ${{ inputs.prompt }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITGENT_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGENT_PROVIDER: ${{ vars.GITGENT_PROVIDER }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GITGENT_MODEL: ${{ vars.GITGENT_MODEL }}
          GITGENT_REPO_ROOT: ${{ github.workspace }}
        run: npx tsx src/main.ts --prompt "$GITGENT_PROMPT"

      - name: Commit artifacts and memory
        if: always()
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"

          git add artifacts/ memory/ 2>/dev/null || true
          git add -u artifacts/ memory/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No artifacts or memory changes to commit."
          else
            git commit -m "chore: gitgent artifacts from dispatch run

            Run: ${RUN_URL}"

            MAX_RETRIES=3
            PUSHED=0
            for i in $(seq 1 $MAX_RETRIES); do
              if git pull --rebase origin "$DEFAULT_BRANCH" 2>/dev/null; then
                if git push; then
                  echo "✅ Committed and pushed."
                  PUSHED=1
                  break
                fi
              fi
              echo "⚠️ Push attempt $i/$MAX_RETRIES failed. Retrying..."
              sleep 2
            done

            if [ "$PUSHED" -ne 1 ]; then
              echo "❌ Failed to push artifacts/memory after $MAX_RETRIES attempts."
              exit 1
            fi
          fi
