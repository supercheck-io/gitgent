# Gitgent User Preferences
# The agent reads this file at the start of every run.
# Customize these to control default output behavior.

# Output preferences — the agent will prefer these formats when not specified in the issue
output:
  markdown: true
  excel: true
  csv: true
  powerpoint: false
  word: false
  json: false

# Research preferences
research:
  depth: moderate        # surface | moderate | deep
  cite_sources: true     # always include source URLs

# Content preferences
content:
  tone: professional     # professional | casual | technical
  language: english
